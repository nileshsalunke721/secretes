name: secret access

on:
    push:
        branches: [main]

jobs:
    fetch-data-aoi:
        runs-on: ubuntu-latest
        steps:
            - name: checkout-code
              uses: actions/checkout@v4

            - name: setup-python
              uses: actions/setup-python@v6
              with:
                   python-version: '3.13'

            - name: install-dependencies
              run: pip install -r requirements.txt

            - name: run-s.py
              env:
                API_KEY: ${{secrets.api_key}}
              run: python s.py

            






